# Fly.io configuration for the backend API
# Deploy: fly launch --config fly.toml
# Set secrets: fly secrets set DATABASE_URL=... SECRET_KEY=... ADMIN_EMAIL=... ADMIN_PASSWORD=...

app = "portfolio-backend"
primary_region = "nrt"

[build]
  dockerfile = "backend/Dockerfile.prod"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/api/health"

[mounts]
  source = "uploads_data"
  destination = "/code/uploads"
