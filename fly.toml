# fly.toml app configuration file generated for portfolio-backend-little-morning-3672 on 2026-03-10T01:41:00+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'portfolio-backend-little-morning-3672'
primary_region = 'nrt'

[build]
  dockerfile = 'backend/Dockerfile.prod'

[env]
  PORT = '8000'

[[mounts]]
  source = 'uploads_data'
  destination = '/code/uploads'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
