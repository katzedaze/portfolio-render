# Render Blueprint — deploys backend + managed PostgreSQL
# Usage: Connect repo on Render dashboard → "New Blueprint Instance"

services:
  - type: web
    name: portfolio-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile.prod
    region: singapore
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: uploads
      mountPath: /code/uploads
      sizeGB: 1

databases:
  - name: portfolio-db
    plan: free
    region: singapore
    databaseName: portfolio_db
    user: portfolio
